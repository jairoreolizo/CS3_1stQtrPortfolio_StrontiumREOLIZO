<!DOCTYPE html>
<html>
<head>
<title>Add a Movie</title>

<style>

body{
    font-family: Arial;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:flex-start;   /* start from top instead of middle */

    background-image: url('https://wallpaperaccess.com/full/6604090.gif');
    background-size: cover;

    min-height:100vh;
    padding:40px 0; /* space at top/bottom */
}

.container{
    width:420px;
    background:#1a1a1a;
    padding:35px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,0.8);
}

h2{
    color:#ff3b3b;
    margin-bottom:10px;
}

label{
    display:block;
    margin-top:18px;
    color:white;
    text-align:center;
}

/* TEXT BOXES */

input, select{
    width:85%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:8px;
    display:block;
    margin-left:auto;
    margin-right:auto;

    background:#2b2b2b;
    color:white;

    /* POP OUT EFFECT */
    box-shadow:0 4px 10px rgba(0,0,0,0.6);
    transition:0.2s;
}

/* when clicked */
input:focus, select:focus{
    outline:none;
    transform:scale(1.05);
    box-shadow:0 6px 18px rgba(255,0,0,0.6);
}

/* BUTTON */

button{
    width:85%;
    padding:12px;
    margin-top:22px;
    background:#ff2d2d;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    display:block;
    margin-left:auto;
    margin-right:auto;

    box-shadow:0 6px 14px rgba(0,0,0,0.6);
    transition:0.2s;
}

button:hover{
    background:#cc0000;
    transform:scale(1.05);
}

.star{
    font-size:30px;
    cursor:pointer;
    color:gray;
    transition:0.2s;
    margin:0 4px;
}

.star:hover{
    transform:scale(1.3);
}

.star:hover ~ .star{
    transform:scale(1.3);
}

.star.active{
    color:gold;
}

#stars{
    margin-top:10px;
    display:flex;
    flex-direction:row-reverse;
    justify-content:center;
}

.movie{
    background:#2a2a2a;
    padding:14px;
    border-radius:8px;
    margin-top:12px;
    color:white;
    box-shadow:0 4px 10px rgba(0,0,0,0.6);
    text-align:center;
    position: relative;
}

.movie-title{
    font-size:20px;
    font-weight:bold;
    color:#ff4c4c;
    margin-bottom:10px;
    text-align:center;
    padding:0 40px;
}

.movie-genre{
    font-size:16px;
    opacity:0.8;
}

.movie-rating{
    margin-top:4px;
}

.movie-item {
    position: relative;
}

.movie-header{
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.delete-btn{
    position:absolute;
    top:4px;
    right:4px;

    width:30px;
    height:30px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:transparent;
    border:none;
    border-radius:8px;

    font-size:18px;
    color:#ff4c4c;
    cursor:pointer;

    margin:0;
    padding:0;
    box-shadow:none;

    transition:0.2s;
}

.delete-btn:hover{
    background:#3a3a3a;
    color:white;
}

.rating-info{
    margin-top:6px;
    font-size:14px;
    opacity:0.8;
}
</style>

</head>

<body>

<div class="container">

<h2>Add a Movie</h2>

<label>Title</label>
<input type="text" id="title">

<label>Year</label>
<input type="number" id="year">

<label>Genre</label>
<select id="genre">
<option value="">Select Genre</option>
<option>Action</option>
<option>Adventure</option>
<option>Animation</option>
<option>Comedy</option>
<option>Drama</option>
<option>Horror</option>
<option>Fantasy</option>
<option>Mystery</option>
<option>Romance</option>
<option>Sci-Fi</option>
<option>Thriller</option>
</select>

<label>Rating</label>

<div id="stars">
<span class="star" data-value="5">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="1">★</span>
</div>

<button onclick="addMovie()">Add Movie</button>

<h2>Movie List</h2>
<div id="movieList"></div>

</div>

<script>

let rating = 0;
const stars = document.querySelectorAll(".star");

stars.forEach(star=>{
    star.addEventListener("click", function(){

        rating = this.getAttribute("data-value");

        stars.forEach(s=>{
            if(s.getAttribute("data-value") <= rating){
                s.classList.add("active");
            }else{
                s.classList.remove("active");
            }
        });

    });
});


function addMovie(){

    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const genre = document.getElementById("genre").value;

    if(title === "" || year === "" || rating === 0){
        alert("Fill all fields");
        return;
    }

    const movie = {
        title:title,
        year:year,
        genre:genre,
        rating:parseInt(rating),
        ratingsCount:1
    };

    let movies = JSON.parse(localStorage.getItem("movies")) || [];


    let existingMovie = movies.find(m => m.title.toLowerCase() === title.toLowerCase());

    if(existingMovie){

        existingMovie.year = year;
        existingMovie.genre = genre;

        existingMovie.rating =
        (existingMovie.rating * existingMovie.ratingsCount + movie.rating) /
        (existingMovie.ratingsCount + 1);

        existingMovie.ratingsCount += 1;
    }else{
        movies.push(movie);
    }

    localStorage.setItem("movies", JSON.stringify(movies));

    displayMovies();

    document.getElementById("title").value="";
    document.getElementById("year").value="";
    rating=0;

    stars.forEach(s=>s.classList.remove("active"));
}

function displayMovies(){

    const movieList = document.getElementById("movieList");

    movieList.innerHTML="";

    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.forEach((m, index)=>{

        let starsHTML = "";

        // round rating to nearest 0.5
        let rounded = Math.round(m.rating * 2) / 2;

        for(let i = 1; i <= 5; i++){

            if(i <= Math.floor(rounded)){
                starsHTML += '<span class="star active">★</span>'; // full star
            }

            else if(i - 0.5 === rounded){
                starsHTML += '<span class="star">⯪</span>'; // half star
            }

            else{
                starsHTML += '<span class="star">☆</span>'; // empty star
            }
}
        const div = document.createElement("div");
        div.className="movie";

        div.innerHTML =
        `
        <div class="movie-header">
            <div class="movie-title">${m.title} (${m.year})</div>
            <button class="delete-btn" onclick="deleteMovie(${index})">✕</button>
        </div>
        <div class="movie-genre">${m.genre}</div>
        <div class="movie-rating">
        ${starsHTML}
        <div class="rating-info">
        ${m.rating.toFixed(2)} / 5 • ${m.ratingsCount} rating(s)
        </div>
        </div>
        `;

        movieList.appendChild(div);

    });

}

function deleteMovie(index){

    const confirmDelete = confirm("Are you sure you want to delete?");

    if(!confirmDelete){
        return;
    }

    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.splice(index, 1);

    localStorage.setItem("movies", JSON.stringify(movies));

    displayMovies();
}

displayMovies();

</script>

</body>
</html>
